id = "herdr-deck"
name = "herdr-deck"
version = "0.1.0"
description = "The companion workspace launcher for herdr-agents.nvim: open or resume Claude and Codex in a ready-made Neovim, agent, shell, and lazygit deck."
min_herdr_version = "0.7.0"
platforms = ["linux", "macos"]

# Herdr builds the same release binary that `cargo install` would install.
[[build]]
command = ["cargo", "build", "--release", "--locked"]

[[actions]]
id = "open"
title = "Open herdr-deck"
description = "Open or resume a Neovim workspace with a connected Claude or Codex agent."
contexts = ["workspace"]
command = ["bash", "scripts/open-deck.sh"]

[[actions]]
id = "toggle-project"
title = "Toggle previous project"
description = "Switch directly between the two most recently visited projects."
contexts = ["workspace"]
command = ["bash", "-c", "exec \"$HERDR_PLUGIN_ROOT/target/release/herdr-deck\" --toggle-project"]

[[events]]
on = "workspace.focused"
command = ["bash", "-c", "exec \"$HERDR_PLUGIN_ROOT/target/release/herdr-deck\" --record-workspace-focus"]

[[panes]]
id = "picker"
title = "herdr-deck"
placement = "popup"
width = "88%"
height = "80%"
command = ["bash", "-c", "exec \"$HERDR_PLUGIN_ROOT/target/release/herdr-deck\""]
